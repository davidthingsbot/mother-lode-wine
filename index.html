<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mother Lode Wine</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="A curated guide to wineries in California's Sierra Foothills">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #722F37; /* Wine red */
    }
    .sidebar-nav > ul > li > a {
      font-weight: bold;
    }
    /* Tighten up sidebar spacing */
    .sidebar-nav li {
      line-height: 1.3;
      margin: 0;
    }
    .sidebar-nav ul {
      padding-left: 15px;
      margin: 0;
    }
    .sidebar-nav > ul > li {
      margin-bottom: 5px;
    }
    .sidebar-nav ul ul li {
      margin: 0;
      padding: 2px 0;
    }
    .app-name-link img {
      max-width: 120px;
    }
    /* Back to top styling */
    .back-to-top {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--theme-color);
      color: white;
      padding: 10px 15px;
      border-radius: 5px;
      text-decoration: none;
      opacity: 0.8;
    }
    .back-to-top:hover {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="app">Loading...</div>
  <a href="#" class="back-to-top">↑ Top</a>
  <script>
    window.$docsify = {
      name: '🍷 Mother Lode Wine',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      homepage: 'README.md',
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      }
    }
  </script>
  <!-- Docsify core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- Search plugin -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <!-- Image zoom -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
</body>
</html>
